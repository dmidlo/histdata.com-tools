[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "histdatacom"
dynamic = ["version"]
description = "A Multi-threaded/Multi-Process command-line utility and python package that downloads currency exchange rates from Histdata.com. Imports to InfluxDB. Can be used in Jupyter Notebooks."
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10.0"
license = "MIT"
authors = [
    { name = "David Midlo", email = "dmidlo@gmail.com" },
]
keywords = [
    "finance",
    "data",
    "datascience",
    "HistData.com",
    "scraper",
    "influxdb",
    "currency exchange",
    "forex",
    "fx",
    "etl",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Environment :: MacOS X",
    "Operating System :: MacOS",
    "Environment :: Win32 (MS Windows)",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Framework :: Jupyter",
    "Topic :: Terminals",
]
dependencies = [
    "influxdb_client",
    "rich",
    "requests",
    "beautifulsoup4",
    "pyyaml",
    "rx",
    "argparse",
    "pytz",
    "certifi",
    "polars",
]

[project.optional-dependencies]
arrow = [
    "pyarrow",
]
pandas = [
    "pandas",
]
jupyter = [
    "jupyter",
    "ipywidgets",
]
dev = [
    "pyarrow",
    "pandas",
    "polars",
    "jupyter",
    "ipywidgets",
    "build",
    "pytest",
    "mypy",
    "keyring",
    "sh",
    "flake8",
    "black",
    "flake8-black",
    "coverage",
    "pytest-cov",
    "setuptools>=77",
    "pylint",
    "bandit",
    "flake8-bandit",
    "flake8-comprehensions",
    "flake8-class-attributes-order",
    "flake8-bugbear",
    "pyflakes",
    "pre-commit",
    "types-setuptools",
    "pandas-stubs",
    "types-beautifulsoup4",
    "wemake-python-styleguide",
    "flake8-simplify",
    "flake8-pie",
    "flake8-use-pathlib",
    "flake8-use-fstring",
    "flake8-print",
    "flake8-no-implicit-concat",
    "pycodestyle",
    "flake8-pytest-style",
    "Flake8-AAA",
    "flake8-spellcheck",
    "flake8-docstring-checker",
    "flake8-docstrings",
    "flake8-coding",
    "flake8-length",
    "flake8-functions",
    "flake8-expression-complexity",
    "flake8-cognitive-complexity",
    "flake8-annotations-complexity",
    "cohesion",
    "Darglint",
    "tryceratops",
    "radon",
    "pyroma",
    "vulture",
    "flake8-type-checking",
    "isort",
    "sourcery-cli",
    "twine",
]

[project.urls]
Homepage = "https://github.com/dmidlo/histdata.com-tools"
"Bug Tracker" = "https://github.com/dmidlo/histdata.com-tools/issues"

[project.scripts]
histdatacom = "histdatacom.histdata_com:main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = { attr = "histdatacom.__version__" }
