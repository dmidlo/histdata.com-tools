# Keep source-quality hooks scoped to package and test code. Root helper/example
# files snippets.py and test.py are intentionally outside that legacy lint
# baseline, while .vulture.py remains a legacy Vulture whitelist and is not
# linted as ordinary source code.
# Generic config/release hooks still inspect root files such as pyproject.toml,
# GitHub workflows, pypi.sh, and pre-commit config. Generated architecture SVGs
# and the example notebook are excluded globally because they are bulky outputs.
exclude: ^(tests/architecture/.*\.svg|snippets\.ipynb)$
default_stages: [commit-msg, pre-commit, pre-push]
repos:
- hooks:
  - args:
    - --line-length
    - '80'
    - --target-version
    - py310
    id: black
    files: ^(src|tests)/.*\.py$
  repo: https://github.com/psf/black
  rev: 26.5.1
- hooks:
  - id: ruff-check
    files: ^(src|tests)/.*\.py$
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.18
- hooks:
  - id: trailing-whitespace
  - id: check-ast
  - id: check-builtin-literals
  - id: check-case-conflict
  - id: check-docstring-first
  - id: check-executables-have-shebangs
  - id: check-shebang-scripts-are-executable
  - id: check-json
  - id: check-symlinks
  - id: check-toml
  - id: check-yaml
  - id: no-commit-to-branch
    args:
      - --branch
      - main
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
- hooks:
  - additional_dependencies:
    - types-PyYAML==6.0.12.20260518
    - pytest==9.1.1
    - pandas-stubs==3.0.3.260530
    - types-beautifulsoup4==4.12.0.20250516
    id: mypy
    files: ^src/.*\.py$
  repo: https://github.com/pre-commit/mirrors-mypy
  rev: v2.1.0
- hooks:
  - id: pyroma
    files: ^(pyproject\.toml|README\.md|LICENSE)$
  repo: https://github.com/regebro/pyroma
  rev: 5.0.1
- hooks:
  - id: shellcheck
    files: ^pypi\.sh$
  repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.11.0.1
- hooks:
  - id: actionlint
  repo: https://github.com/rhysd/actionlint
  rev: v1.7.12
- hooks:
  - id: histdatacom
    entry: scripts/run_dev_tool.py histdatacom
    language: system
    name: histdatacom
    pass_filenames: false
    always_run: True
    verbose: True
    types:
      - python
    args:
      - --version
  - id: architecture-diagrams
    name: architecture-diagrams
    entry: scripts/run_dev_tool.py python
    language: system
    args:
      - tests/architecture/generate_diagrams.py
    pass_filenames: false
    always_run: True
    verbose: True
    stages:
      - pre-commit
  - id: coverage-run
    name: coverage-run
    entry: scripts/run_dev_tool.py coverage
    language: system
    args: ["run"]
    pass_filenames: false
    always_run: True
    types:
      - python
  - id: coverage-combine
    name: coverage-combine
    entry: scripts/run_dev_tool.py coverage
    language: system
    args: ["combine"]
    pass_filenames: false
    always_run: True
    types:
      - python
  - id: coverage-report
    name: coverage-report
    entry: scripts/run_dev_tool.py coverage
    language: system
    args: ["report"]
    pass_filenames: false
    always_run: True
    verbose: True
    types:
      - python
  - id: coverage-rm
    name: coverage-rm
    entry: scripts/run_dev_tool.py
    language: system
    args: ["--remove", ".coverage"]
    pass_filenames: false
    always_run: True
  repo: local
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.16.3
  hooks:
    - id: commitizen
    - id: commitizen-branch
      stages: [pre-push]
