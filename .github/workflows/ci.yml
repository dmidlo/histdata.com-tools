name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Download actionlint
        run: |
          bash <(curl --fail --location --show-error https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
        shell: bash

      - name: Check workflow files
        run: ./actionlint -color
        shell: bash

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install -e ".[pandas,arrow]" pytest pytest-cov

      - name: Run tests with coverage
        run: python -m pytest --cov=histdatacom --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html

      - name: Enforce coverage threshold
        run: python -m coverage report

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Compile source and tests
        run: python -m compileall -q src tests test.py snippets.py

      - name: Validate package metadata
        run: python setup.py check

  build:
    name: Build package artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package artifacts
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: histdatacom-dist
          path: dist/*
          if-no-files-found: error
