name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Download actionlint
        run: |
          bash <(curl --fail --location --show-error https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
        shell: bash

      - name: Check workflow files
        run: ./actionlint -color
        shell: bash

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install -e ".[test]"

      - name: Run tests with coverage
        run: python -m pytest --cov=histdatacom --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html

      - name: Enforce coverage threshold
        run: python -m coverage report

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Compile source and tests
        run: python -m compileall -q src tests scripts test.py snippets.py

      - name: Smoke editable install metadata
        run: |
          python - <<'PY'
          from importlib import metadata

          import histdatacom

          dist = metadata.distribution("histdatacom")
          scripts = {
              entry.name: entry.value
              for entry in metadata.entry_points().select(group="console_scripts")
          }

          assert dist.metadata["Name"] == "histdatacom"
          assert metadata.version("histdatacom") == histdatacom.__version__
          assert scripts["histdatacom"] == "histdatacom.histdata_com:main"
          assert scripts["histdatacom-sidecar"] == "histdatacom.sidecar.cli:main"
          assert scripts["histdatacom-sidecar-worker"] == "histdatacom.sidecar.worker:main"
          PY
        shell: bash

  build:
    name: Build package artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install -e ".[release]"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package artifacts
        run: python -m twine check dist/*

      - name: Inspect wheel metadata
        run: python scripts/inspect_wheel.py

      - name: Smoke wheel install
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from importlib import metadata

          import histdatacom
          from histdatacom.sidecar import (
              SidecarExecutableUnavailable,
              load_sidecar_manifest,
              sidecar_asset,
              sidecar_executable_path,
          )

          assert metadata.version("histdatacom") == histdatacom.__version__
          assert sidecar_asset("manifest.json").is_file()
          assert load_sidecar_manifest().sidecar == "temporal"
          try:
              with sidecar_executable_path("linux-x86_64"):
                  raise AssertionError("metadata-only wheel exposed executable")
          except SidecarExecutableUnavailable as err:
              assert "not bundled in this distribution" in str(err)
          PY
          histdatacom --version
          histdatacom-sidecar --help >/dev/null
          histdatacom-sidecar-worker --help >/dev/null
        shell: bash

      - name: Smoke wheel extras install
        run: |
          python -m venv .wheel-extras-smoke
          . .wheel-extras-smoke/bin/activate
          python -m pip install --upgrade pip
          wheel="$(ls dist/*.whl)"
          python -m pip install "${wheel}[all]"
          python - <<'PY'
          from importlib import metadata
          import importlib.util

          for distribution_name in (
              "influxdb-client",
              "ipywidgets",
              "jupyter",
              "pandas",
              "pyarrow",
              "temporalio",
          ):
              metadata.version(distribution_name)

          for module_name in (
              "influxdb_client",
              "ipywidgets",
              "pandas",
              "pyarrow",
              "temporalio",
          ):
              if importlib.util.find_spec(module_name) is None:
                  raise SystemExit(f"missing expected optional module {module_name}")
          PY
        shell: bash

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: histdatacom-dist
          path: dist/*
          if-no-files-found: error
