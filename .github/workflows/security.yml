name: Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "37 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development

  python-dependency-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install audit environment
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install -e ".[all]"
          python -m pip install "pip-audit==2.10.1"

      - name: Verify runtime dependency audit surface
        run: python scripts/smoke_runtime_install.py --expect-temporal-extra --skip-cli

      - name: Run pip-audit
        run: |
          python -m pip freeze --exclude-editable > pip-audit-requirements.txt
          python -m pip_audit --requirement pip-audit-requirements.txt --strict --format=json --output=pip-audit.json --progress-spinner=off

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: warn

  codeql:
    name: CodeQL Python analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: python
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: "/language:python"
