name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_target:
        description: "Build only, publish to TestPyPI, or publish to PyPI"
        required: true
        default: build-only
        type: choice
        options:
          - build-only
          - testpypi
          - pypi
      testpypi_dry_run_confirmed:
        description: "Required for PyPI: confirm this version passed TestPyPI first"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          python -m pip install -e ".[release]"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package artifacts
        run: python -m twine check dist/*

      - name: Inspect wheel sidecar resources
        run: python scripts/inspect_wheel.py

      - name: Generate artifact provenance attestation
        uses: actions/attest@v4.1.0
        with:
          subject-path: dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: histdatacom-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.release_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/histdatacom
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: histdatacom-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.release_target == 'pypi'
    environment:
      name: pypi
      url: https://pypi.org/p/histdatacom
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Require TestPyPI dry-run confirmation
        if: ${{ inputs.testpypi_dry_run_confirmed != true }}
        run: |
          echo "Set testpypi_dry_run_confirmed=true only after this version passes TestPyPI."
          exit 1
        shell: bash

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: histdatacom-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          print-hash: true
